<!-- play-circle-green.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 120 120" role="img" aria-label="Play">
  <!-- green circle background -->
  <circle cx="60" cy="60" r="60" fill="#28a745"/>
  <!-- white play triangle, centered -->
  <polygon points="50,40 50,80 85,60" fill="#ffffff"/>
</svg>

